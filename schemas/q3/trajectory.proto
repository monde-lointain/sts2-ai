syntax = "proto3";

// sts2.schema.major: 0
// sts2.schema.minor: 0
package sts2.q3.v0;

message SchemaVersion {
  uint32 major = 1;
  uint32 minor = 2;
}

message TrajectoryStep {
  bytes rich_state = 1;
  repeated uint32 legal_action_ids = 2;
  repeated float search_policy = 3;
  float search_value = 4;
  uint32 action_taken = 5;
  float reward = 6;
  bool terminal = 7;
}

message Trajectory {
  SchemaVersion schema_version = 1;
  string trajectory_id = 2;
  string episode_id = 3;
  uint64 seed = 4;
  string model_version = 5;
  string sampling_mode = 6;
  string generator = 7;
  repeated TrajectoryStep steps = 8;
}
