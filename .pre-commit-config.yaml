exclude: '^contracts/generated/.*'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        exclude: '^(contracts/generated/|.*\.proto$)'
  - repo: local
    hooks:
      - id: no-relative-venv
        name: Block introduction of relative .venv/bin paths
        entry: python3 .pre-commit-hooks/no-relative-venv.py
        language: system
        files: '^(Makefile|.*\.(sh|yml|yaml))$'
        exclude: '^\.pre-commit-config\.yaml$'
      - id: proto-adr-gate
        name: Block main-bound push if proto edits lack ADR pairing
        entry: python3 .pre-commit-hooks/pre-push-proto-adr-gate.py
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
