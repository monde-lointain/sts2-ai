name: sanitizers (nightly)

# Runs daily at 07:00 UTC and on-demand. Moved out of ci.yml because the job
# takes ~1h45min and was the long pole of every PR run; failures here are
# caught the next morning instead of blocking iteration. Mirrors clang-tidy
# pattern.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  sanitize-test:
    name: ASan + UBSan tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18
      - name: Cache sanitize build dir
        uses: actions/cache@v4
        with:
          path: build-sanitize/
          key: sanitize-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: sanitize-${{ runner.os }}-
      - name: Run sanitize-test
        env:
          CC: clang-18
          CXX: clang++-18
        run: make sanitize-test
