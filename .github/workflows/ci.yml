name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  pre-commit:
    name: pre-commit (clang-format + structural)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install pre-commit + clang-format-18
        run: |
          pip install pre-commit
          sudo apt-get update
          sudo apt-get install -y clang-format-18
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  q2-fast:
    name: Q2 fast tests (make test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build/
          key: q2-fast-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'engine/cpp/**/CMakeLists.txt') }}
          restore-keys: |
            q2-fast-${{ runner.os }}-
      - name: Build + test
        run: make test

  q1-ci:
    name: Q1 headless (dotnet build+test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('engine/headless/**/*.csproj', 'engine/headless/sts2-headless.sln') }}
          restore-keys: nuget-
      - name: Run q1-ci
        run: make q1-ci

  python-quality:
    name: Python quality (ruff + basedpyright + vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Setup .venv
        # basedpyright needs torch stubs for pipeline/trainer/* type
        # resolution; install CPU torch the same way q10-ci does. The
        # quality job exists separately from q3/q10-ci so analyzer
        # failures don't get attributed to test failures (and vice versa).
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install pytest pytest-cov numpy protobuf PyYAML
          .venv/bin/pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Run python-quality
        run: make python-quality

  q1-quality:
    name: Q1 quality (CSharpier + Roslyn analyzers + jb inspectcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('engine/headless/**/*.csproj', 'engine/headless/sts2-headless.sln') }}
          restore-keys: nuget-
      - name: Restore dotnet tools (csharpier + jb)
        run: dotnet tool restore
      - name: Run q1-quality (format-check + build w/ analyzers)
        run: make q1-quality
      - name: Run jb inspectcode (deep)
        # Slow (multi-minute). Severity gate: fail only on ERROR;
        # WARNING report uploaded as artifact for inspection.
        run: make q1-inspect
        continue-on-error: false
      - name: Upload inspectcode report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q1-inspect-report
          path: engine/headless/.inspect-report.xml
          if-no-files-found: ignore

  q3-ci:
    name: Q3 experience-store (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Setup .venv
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest pytest-cov numpy protobuf PyYAML
      - name: Run q3-ci
        run: make q3-ci

  q10-ci:
    name: Q10 trainer (pytest, includes torch CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Setup .venv (CPU torch)
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest pytest-cov numpy protobuf PyYAML
          .venv/bin/pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Run q10-ci
        run: make q10-ci

  schema-test:
    name: Schema compat (codegen + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Setup .venv
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest protobuf
      - name: Run schema-test
        run: make schema-test

  content-test:
    name: Content registry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Setup .venv
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest PyYAML
      - name: Run content-test
        run: make content-test

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy-18
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build/
          key: tidy-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: tidy-${{ runner.os }}-
      - name: Run clang-tidy
        run: make tidy

  cppcheck:
    name: cppcheck (custom build, HAVE_RULES=ON)
    runs-on: ubuntu-latest
    env:
      CPPCHECK_VERSION: "2.18.3"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # external/cppcheck-rules
      - name: Install runtime deps
        # libpcre3 needed at runtime by cppcheck built with HAVE_RULES=ON
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3
      - name: Cache cppcheck install tree
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cppcheck-install
          key: cppcheck-${{ env.CPPCHECK_VERSION }}-rules-${{ runner.os }}
      - name: Build cppcheck from source with rules support
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        # Stock apt cppcheck lacks HAVE_RULES=ON; the project relies on
        # custom rules in external/cppcheck-rules/, applied via cppcheck's
        # --rule-file (which is a no-op without HAVE_RULES). Build from
        # source to match the local dev configuration (cppcheck 2.18.3).
        run: |
          sudo apt-get install -y ninja-build cmake g++ libpcre3-dev
          git clone --depth 1 --branch "$CPPCHECK_VERSION" \
            https://github.com/danmar/cppcheck.git /tmp/cppcheck-src
          cmake -B /tmp/cppcheck-src/build -S /tmp/cppcheck-src -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHAVE_RULES=ON \
            -DUSE_MATCHCOMPILER=ON
          cmake --build /tmp/cppcheck-src/build -j"$(nproc)"
          cmake --install /tmp/cppcheck-src/build \
            --prefix "${{ github.workspace }}/.cppcheck-install"
      - name: Add cppcheck to PATH
        run: echo "${{ github.workspace }}/.cppcheck-install/bin" >> "$GITHUB_PATH"
      - name: Verify cppcheck supports rules
        # Smoke: --rule-file is rejected as unknown when HAVE_RULES=OFF
        run: |
          cppcheck --version
          cppcheck --rule-file=external/cppcheck-rules/EmptyIfStatement/rule.xml --help >/dev/null
      - name: Run project cppcheck target
        run: make cppcheck

  sanitize-test:
    name: ASan + UBSan tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18
      - name: Cache sanitize build dir
        uses: actions/cache@v4
        with:
          path: build-sanitize/
          key: sanitize-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: sanitize-${{ runner.os }}-
      - name: Run sanitize-test
        env:
          CC: clang-18
          CXX: clang++-18
        run: make sanitize-test

  q2-ci:
    name: Q2 slow regression (~18 min; label-gated)
    runs-on: ubuntu-latest
    # Plan resolution #3: label-gated on PRs; not auto-run on push to keep
    # private-repo minutes predictable. Trigger manually via workflow_dispatch
    # for explicit pushes.
    if: |
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-q2-ci')) ||
      (github.event_name == 'workflow_dispatch')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Cache q2-ci build dir
        uses: actions/cache@v4
        with:
          path: build-q2-ci/
          key: q2-ci-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: q2-ci-${{ runner.os }}-
      - name: Run q2-ci
        run: make q2-ci
