name: clang-tidy (nightly)

# Runs daily at 06:00 UTC and on-demand. Moved out of ci.yml because the job
# takes ~25 min and was the long pole of every PR run; failures here are caught
# the next morning instead of blocking iteration.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy-18 ca-certificates lsb-release wget
          wget https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get install -y -V ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get update
          sudo apt-get install -y -V libarrow-dev libparquet-dev
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build/
          key: tidy-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: tidy-${{ runner.os }}-
      - name: Run clang-tidy
        run: make tidy
