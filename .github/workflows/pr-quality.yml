name: PR Quality

on:
  pull_request:
    branches: [main]

jobs:
  cloc-delta:
    name: cloc delta (PR vs base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc
      - name: Compute cloc delta
        run: |
          cloc --git --diff "$GITHUB_BASE_REF" HEAD || true
